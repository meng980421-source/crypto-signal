name: Crypto Signal Scheduler

on:
  schedule:
    # 每 15 分钟执行一次（UTC），对应北京时间整点/15/30/45 分
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:   # 也支持手动触发

permissions:
  contents: write

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. 拉取代码（含上次的 signal_state.json）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 设置 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # 3. 安装依赖
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. 写入 Firebase 服务账号密钥
      - name: Create Firebase key file
        run: echo '${{ secrets.FIREBASE_KEY_JSON }}' > firebase-key.json

      # 5. 运行信号检测（单次模式）
      - name: Run scheduler
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          FCM_DEVICE_TOKEN: ${{ secrets.FCM_DEVICE_TOKEN }}
        run: python scheduler.py --once

      # 6. 把更新后的 signal_state.json 提交回 repo（状态持久化）
      - name: Commit signal state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signal_state.json
          git diff --cached --quiet && echo "no change" || \
            git commit -m "chore: update signal_state [skip ci]"
          git push origin HEAD
